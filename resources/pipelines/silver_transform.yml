# Pipeline: Silver Layer Transformation
# Purpose: Transforms bronze data into clean, validated silver tables
#
# Note: dim_customers and dim_restaurant are NOT produced here.
# They are managed by 'pipelline_ingestion_silver' (Lakeflow Connect managed ingestion,
# pipeline ID: 508b0758-c087-4e83-ac85-1ea552f169a8).

resources:
  pipelines:
    silver_transform:
      name: pipeline_tranfm_silver

      # Target Unity Catalog location
      catalog: ${var.catalog_name}
      target: 02_silver

      # Serverless compute
      serverless: true
      photon: true

      # Continuous streaming processing
      continuous: true

      # Source code for this pipeline
      libraries:
        - file:
            path: ../src/silver/fact_orders.py
        - file:
            path: ../src/silver/fact_order_items.py
        - file:
            path: ../src/silver/fact_reviews.sql

      # Development mode
      development: false
